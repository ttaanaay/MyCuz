name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system packages
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            zip \
            unzip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            build-essential \
            libffi-dev \
            libssl-dev \
            libjpeg-dev \
            libpng-dev \
            libtinfo5 \
            openjdk-17-jdk

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Build Tools
        run: |
          pip install Cython==0.29.37
          pip install buildozer==1.5.0

          # ล็อก python-for-android
          pip install \
            "python-for-android<2024.01.21"

      - name: Install Project Requirements
        run: |
          pip install -r requirements.txt

      - name: Show Versions
        run: |
          python --version
          buildozer --version
          pip show python-for-android || true

      - name: Build APK
        run: |
          buildozer android clean
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaCuz-APK
          path: bin/*.apk